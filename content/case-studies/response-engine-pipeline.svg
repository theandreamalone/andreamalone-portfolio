<svg width="680" height="500" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" role="img">
<title>NetHive IQ response engine pipeline</title>
<desc>Flowchart showing how a user question becomes a formatted AI response: intent classification, schema selection, core and triggered blocks assembled in parallel, a human review safety screen, then the final formatted output.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>
.title{font:500 14px sans-serif;} .sub{font:400 12px sans-serif;}
.purple{fill:#EEEDFE;stroke:#534AB7;} .purpleText{fill:#26215C;} .purpleSub{fill:#3C3489;}
.gray{fill:#F1EFE8;stroke:#5F5E5A;} .grayText{fill:#2C2C2A;} .graySub{fill:#444441;}
.teal{fill:#E1F5EE;stroke:#0F6E56;} .tealText{fill:#04342C;} .tealSub{fill:#085041;}
.coral{fill:#FAECE7;stroke:#993C1D;} .coralText{fill:#4A1B0C;} .coralSub{fill:#712B13;}
.arr{stroke:#534AB7;stroke-width:1;fill:none;}
</style>

<g>
<rect class="purple" x="210" y="20" width="260" height="56" rx="8" stroke-width="0.5"/>
<text class="title purpleText" x="340" y="40" text-anchor="middle" dominant-baseline="central">Intent classification</text>
<text class="sub purpleSub" x="340" y="58" text-anchor="middle" dominant-baseline="central">Single or compound request</text>
</g>

<line x1="340" y1="76" x2="340" y2="112" class="arr" marker-end="url(#arrow)"/>

<g>
<rect class="purple" x="210" y="116" width="260" height="56" rx="8" stroke-width="0.5"/>
<text class="title purpleText" x="340" y="136" text-anchor="middle" dominant-baseline="central">Schema selection</text>
<text class="sub purpleSub" x="340" y="154" text-anchor="middle" dominant-baseline="central">Maps intent to schema</text>
</g>

<path d="M340 172 L340 192 L190 192 L190 208" class="arr" marker-end="url(#arrow)"/>
<path d="M340 172 L340 192 L490 192 L490 208" class="arr" marker-end="url(#arrow)"/>

<g>
<rect class="gray" x="60" y="212" width="260" height="56" rx="8" stroke-width="0.5"/>
<text class="title grayText" x="190" y="232" text-anchor="middle" dominant-baseline="central">Core blocks</text>
<text class="sub graySub" x="190" y="250" text-anchor="middle" dominant-baseline="central">Required by schema</text>
</g>

<g>
<rect class="teal" x="360" y="212" width="260" height="56" rx="8" stroke-width="0.5"/>
<text class="title tealText" x="490" y="232" text-anchor="middle" dominant-baseline="central">Triggered blocks</text>
<text class="sub tealSub" x="490" y="250" text-anchor="middle" dominant-baseline="central">Added when conditions match</text>
</g>

<path d="M190 268 L190 288 L280 288 L280 304" class="arr" marker-end="url(#arrow)"/>
<path d="M490 268 L490 288 L400 288 L400 304" class="arr" marker-end="url(#arrow)"/>

<g>
<rect class="coral" x="210" y="308" width="260" height="56" rx="8" stroke-width="0.5"/>
<text class="title coralText" x="340" y="328" text-anchor="middle" dominant-baseline="central">Human review screen</text>
<text class="sub coralSub" x="340" y="346" text-anchor="middle" dominant-baseline="central">Escalates on named conditions</text>
</g>

<line x1="340" y1="364" x2="340" y2="400" class="arr" marker-end="url(#arrow)"/>

<g>
<rect class="gray" x="210" y="404" width="260" height="56" rx="8" stroke-width="0.5"/>
<text class="title grayText" x="340" y="424" text-anchor="middle" dominant-baseline="central">Formatted response</text>
<text class="sub graySub" x="340" y="442" text-anchor="middle" dominant-baseline="central">Persona and syntax applied</text>
</g>
</svg>
